name: CD

# Builds and publishes the production image (ADR-0009/ADR-0014: single container,
# built from apps/api/Settl.Api/Dockerfile with the repo root as build context),
# then calls Dokploy's authenticated deploy API so the new image actually gets rolled
# out. We use the API-token method (POST /api/application.deploy with an x-api-key
# header) rather than the no-auth deploy webhook the Dokploy UI surfaces: the webhook
# URL form has a history of 404ing across Dokploy versions, while the API endpoint is
# documented and stable. See docs/ops/production.md "Deploy flow".
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  publish:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/settl-api
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Settl.Api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Dokploy deploy
        env:
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          DOKPLOY_APP_ID: ${{ secrets.DOKPLOY_APP_ID }}
        run: |
          curl -fsS -X POST "http://31.70.90.93:3000/api/application.deploy" \
            -H "accept: application/json" \
            -H "Content-Type: application/json" \
            -H "x-api-key: $DOKPLOY_API_KEY" \
            -d "{\"applicationId\": \"$DOKPLOY_APP_ID\"}"
