<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="any" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Installable home-screen web app, manifest-only / no service worker (installable-pwa spec). -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- Status bar tint follows the app background in each scheme (not the green splash colour). -->
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f4f6f2" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#141a16" />
    <!-- iOS has no manifest install prompt; these drive the standalone launch + home-screen icon. -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Settl" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=Spline+Sans+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <title>Settl</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
